name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pysnmp-lextudio

      - name: Run Black
        run: black --check --diff custom_components/snmp_printer_canon_enhanced/

      - name: Run isort
        run: isort --check-only --diff custom_components/snmp_printer_canon_enhanced/

      - name: Run flake8
        run: flake8 --max-line-length=120 --extend-ignore=E203 custom_components/snmp_printer_canon_enhanced/

